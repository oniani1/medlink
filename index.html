    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      
      html {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f1f5f9;
        -webkit-tap-highlight-color: transparent;
        height: 100%;
        overflow: hidden;
        margin: 0;
        overscroll-behavior: none;
      }
      
      /* Prevent iOS Safari rubber-band scrolling on the body */
      
      @media (max-width: 639px) {
        html, body {
          position: fixed;
          width: 100%;
        }
      }
      
      #root {
        height: 100%;
        overflow: hidden;
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      @keyframes slide-up {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      .animate-slide-up {
        animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes slide-in-right {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      
      .animate-slide-in-right {
        animation: slide-in-right 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes slide-down {
        from { transform: translateY(-100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      .animate-slide-down {
        animation: slide-down 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes fade-in-scale {
        from { opacity: 0; transform: scale(0.97); }
        to { opacity: 1; transform: scale(1); }
      }
      
      .animate-fade-in-scale {
        animation: fade-in-scale 0.2s ease-out forwards;
      }
      
      @keyframes send-pop {
        0% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.03); }
        100% { transform: scale(1); opacity: 1; }
      }
      
      .animate-send-pop {
        animation: send-pop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes typing-dot {
        0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(-4px); }
      }
      
      .typing-dot {
        animation: typing-dot 1.4s infinite;
      }
      
      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }
      
      @keyframes qr-scan {
        0%, 100% { top: 16px; opacity: 0.4; }
        50% { top: calc(100% - 16px); opacity: 1; }
      }
      
      .qr-scan-line {
        animation: qr-scan 2s ease-in-out infinite;
        box-shadow: 0 0 8px rgba(45, 212, 191, 0.6);
      }
    </style>
